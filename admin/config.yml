backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://melhairbraiding.net"
display_url: "https://melhairbraiding.net"
logo_url: "https://melhairbraiding.net/favicon.ico"

collections:

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "branding"
        label: "Branding & Logo"
        file: "content/branding.json"
        format: "json"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string", default: "Mel Hair Braiding" }
          - { label: "Logo Image", name: "logoImage", widget: "image", required: false, hint: "Upload your logo. Recommended: PNG transparent background, 300px+ wide." }
          - { label: "Logo Text (if no image)", name: "logoText", widget: "string", default: "MHB" }
          - { label: "Footer Tagline", name: "footerTagline", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Phone Link", name: "phoneHref", widget: "string", hint: "Format: +12028928841" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "City / Location", name: "location", widget: "string" }

  - name: "homepage"
    label: "Homepage"
    files:
      - name: "home"
        label: "Homepage Content"
        file: "content/site.json"
        format: "json"
        fields:
          - { label: "Search Description", name: "description", widget: "text" }
          - label: "Hero Slideshow"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Small Heading", name: "eyebrow", widget: "string" }
              - { label: "Headline Line 1", name: "headline1", widget: "string" }
              - { label: "Headline Line 2", name: "headline2", widget: "string" }
              - { label: "Subheading", name: "copy", widget: "text" }
              - { label: "Primary Button Text", name: "primaryButton", widget: "string" }
              - { label: "Secondary Button Text", name: "secondaryButton", widget: "string" }
              - label: "Hero Background Videos (up to 3)"
                name: "slides"
                widget: "list"
                min: 1
                max: 3
                hint: "Upload short MP4 videos (15-30 sec, under 50MB each). They will play silently in the background, rotating every 5 seconds."
                fields:
                  - { label: "Video File (MP4)", name: "videoFile", widget: "file", required: false, hint: "Upload an MP4 video file for background playback." }
                  - { label: "Fallback Image", name: "image", widget: "image", hint: "Shown while video loads or on slow connections." }
                  - { label: "Alt Text", name: "alt", widget: "string" }
          - label: "About Preview Section"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Small Heading", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph", name: "copy", widget: "text" }
              - { label: "Section Image", name: "image", widget: "image", required: false }
              - { label: "Image Quote", name: "imageQuote", widget: "string" }
          - label: "Services Section Heading"
            name: "servicesSection"
            widget: "object"
            fields:
              - { label: "Small Heading", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "Services"
            name: "services"
            widget: "list"
            summary: "{{fields.name}} - {{fields.price}}"
            fields:
              - { label: "Initials", name: "initials", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Duration", name: "duration", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
          - label: "Video Section"
            name: "videos"
            widget: "object"
            fields:
              - { label: "Small Heading", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subheading", name: "copy", widget: "text" }
              - label: "Videos"
                name: "items"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Video File (MP4)", name: "videoFile", widget: "file", required: false, hint: "Upload an MP4 video. Keep under 50MB. Recommended: 20-30 second clips." }
                  - { label: "Thumbnail Image", name: "thumbnail", widget: "image", required: false }
                  - { label: "Video Label", name: "label", widget: "string" }
                  - { label: "Alt Text", name: "alt", widget: "string" }
                  - { label: "Duration (display only)", name: "duration", widget: "string", default: "0:20" }
          - label: "Gallery Strip Section"
            name: "galleryPreview"
            widget: "object"
            fields:
              - { label: "Small Heading", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "Quote Banner"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Quote Text", name: "text", widget: "text" }
              - { label: "Attribution", name: "author", widget: "string" }
          - label: "Care Tips Section"
            name: "care"
            widget: "object"
            fields:
              - { label: "Small Heading", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Tips"
                name: "tips"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "tip", widget: "text" }
          - label: "Booking Section"
            name: "booking"
            widget: "object"
            fields:
              - { label: "Small Heading", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph", name: "copy", widget: "text" }
              - { label: "Background Image", name: "image", widget: "image", required: false, hint: "Upload your own photo for the booking section background." }
              - { label: "Button Text", name: "button", widget: "string" }
              - { label: "Phone Display", name: "phoneDisplay", widget: "string" }
              - { label: "Phone Link", name: "phoneHref", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Footer Text", name: "copy", widget: "text" }
              - { label: "Photo Credit (optional)", name: "credit", widget: "string", required: false }

  - name: "gallery"
    label: "Gallery"
    files:
      - name: "gallery"
        label: "Gallery Images"
        file: "content/gallery.json"
        format: "json"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false, hint: "Upload the background image for the Gallery page header." }
          - label: "Gallery Images"
            name: "images"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption / Style Name", name: "caption", widget: "string" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Knotless Braids", value: "knotless" }
                  - { label: "Box Braids", value: "box" }
                  - { label: "Feed-In Cornrows", value: "cornrows" }
                  - { label: "Boho Twists", value: "twists" }
                  - { label: "Locs", value: "locs" }

  - name: "about"
    label: "About Page"
    files:
      - name: "about"
        label: "About Page Content"
        file: "content/about.json"
        format: "json"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Story Image", name: "storyImage", widget: "image", required: false }
          - { label: "Story Heading", name: "storyHeading", widget: "string" }
          - { label: "Story Paragraph 1", name: "story1", widget: "text" }
          - { label: "Pull Quote", name: "pullQuote", widget: "string" }
          - { label: "Story Paragraph 2", name: "story2", widget: "text" }
          - label: "Team Members"
            name: "team"
            widget: "list"
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Bio", name: "bio", widget: "text" }

  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "testimonials"
        label: "Client Testimonials"
        file: "content/testimonials.json"
        format: "json"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false, hint: "Upload the background image for the Testimonials page header." }
          - label: "Testimonials"
            name: "items"
            widget: "list"
            summary: "{{fields.author}} - {{fields.service}}"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Client Name", name: "author", widget: "string" }
              - { label: "Service Received", name: "service", widget: "string" }
              - { label: "Star Rating", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
              - { label: "Featured (dark card)", name: "featured", widget: "boolean", default: false }

  - name: "pricing"
    label: "Pricing"
    files:
      - name: "pricing"
        label: "Pricing Page"
        file: "content/pricing.json"
        format: "json"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Deposit Amount", name: "depositAmount", widget: "string", default: "$20" }
          - { label: "Cancellation Policy", name: "cancellationPolicy", widget: "text" }
          - label: "Price List Images"
            name: "priceListImages"
            widget: "list"
            hint: "Upload price list images. Add as many as needed."
            summary: "Image {{index}}"
            field: { label: "Price List Image", name: "image", widget: "image" }
          - label: "Price Tables (Editable)"
            name: "priceTables"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Table Title", name: "title", widget: "string" }
              - { label: "Subtitle / Note", name: "subtitle", widget: "string", required: false }
              - label: "Column Headers (Sizes)"
                name: "sizes"
                widget: "list"
                field: { label: "Size", name: "size", widget: "string" }
              - label: "Price Rows"
                name: "rows"
                widget: "list"
                summary: "{{fields.length}}"
                fields:
                  - { label: "Length / Row Label", name: "length", widget: "string" }
                  - label: "Prices (one per size column)"
                    name: "prices"
                    widget: "list"
                    field: { label: "Price ($)", name: "price", widget: "number" }
              - { label: "Footer Notes", name: "notes", widget: "text", required: false }
          - label: "Services"
            name: "services"
            widget: "list"
            summary: "{{fields.name}} - {{fields.price}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Starting Price", name: "price", widget: "string" }
              - { label: "Duration", name: "duration", widget: "string" }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
              - label: "Features List"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "feature", widget: "string" }
          - label: "Add-Ons"
            name: "addons"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }

  - name: "book"
    label: "Book Now Page"
    files:
      - name: "book"
        label: "Book Now Page"
        file: "content/book.json"
        format: "json"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false, hint: "Upload the background image for the Book Now page header." }

  - name: "contact"
    label: "Contact & Hours"
    files:
      - name: "contact"
        label: "Contact Info & Hours"
        file: "content/contact.json"
        format: "json"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Phone Link", name: "phoneHref", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Location Note", name: "location", widget: "string" }
          - label: "Studio Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day(s)", name: "day", widget: "string" }
              - { label: "Hours", name: "hours", widget: "string" }
